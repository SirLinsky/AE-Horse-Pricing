<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RedM Horse Pricing</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
  padding:20px;
}

.container {
  max-width:750px;
  margin:auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
}

select, input {
  width:100%;
  padding:8px;
  margin:5px 0 15px 0;
  background:#2a2a2a;
  color:white;
  border:none;
}

button {
  width:100%;
  padding:12px;
  border:none;
  font-size:16px;
  cursor:pointer;
  border-radius:6px;
}

#calcBtn {
  background:orange;
  color:black;
  font-weight:bold;
}

#copyBtn {
  background:#444;
  color:white;
  margin-top:10px;
  display:none;
}

.section {
  margin-bottom:20px;
  padding-bottom:10px;
  border-bottom:1px solid #333;
}

#rpSection {
  display:none;
  background:#222;
  padding:10px;
  border-radius:8px;
}

.result {
  margin-top:20px;
  font-size:16px;
  white-space:pre-line;
  background:#0f0f0f;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>RedM Horse Pricing System</h2>

<div class="section">

<label>Breed</label>
<input list="breedList" id="breed" placeholder="Search breed...">
<datalist id="breedList"></datalist>

<label>Bred / Custom</label>
<select id="bred">
<option value="1">Bred</option>
<option value="0.9">Custom</option>
</select>

<label>Purebred / Mixed</label>
<select id="breedtype">
<option value="1.2">Purebred</option>
<option value="0.9">Mixed</option>
</select>

<label>Sex</label>
<select id="sex">
<option value="1">Mare</option>
<option value="1">Stallion</option>
<option value="0.8">Gelding</option>
<option value="0.8">Spayed</option>
</select>

<label>Pattern</label>
<select id="pattern"></select>

<label>Color</label>
<select id="color"></select>

<label>XP</label>
<input type="number" id="xp" min="0" step="1" value="0">

<label>Max XP (10k+)</label>
<select id="maxxp">
<option value="0">No</option>
<option value="1">Yes</option>
</select>

<label>RP Enabled?</label>
<select id="rp" onchange="toggleRP()">
<option value="0">No</option>
<option value="1">Yes</option>
</select>

</div>

<div id="rpSection">

<label>Age</label>
<select id="age">
<option value="1.1">1-3</option>
<option value="1.05">3-6</option>
<option value="1">6-10</option>
<option value="1">10-15</option>
<option value="0.95">15-20</option>
<option value="0.8">20+</option>
</select>

<label>Full Lineage</label>
<select id="lineage">
<option value="1">No</option>
<option value="1.1">Yes</option>
</select>

<label>Experience</label>
<select id="exp">
<option value="0.8">Unhandled</option>
<option value="1">Started</option>
<option value="1">Green</option>
<option value="1.1">Intermediate</option>
<option value="1.15">Advanced</option>
<option value="1.2">Elite</option>
</select>

<label>Competition Placings</label>
<select id="comp">
<option value="1">No</option>
<option value="1.1">Yes</option>
</select>

<label>Health Status</label>
<select id="health">
<option value="1.1">Clean record</option>
<option value="1">Minor injuries</option>
<option value="0.9">Moderate injuries</option>
<option value="0.85">Severe injuries</option>
<option value="0.8">Current injury</option>
<option value="0.7">Chronic condition</option>
</select>

<label>Papers</label>
<select id="papers">
<option value="1">No</option>
<option value="1.1">Yes</option>
</select>

</div>

<button id="calcBtn" onclick="calculate()">GENERATE PRICE</button>

<div class="result" id="result"></div>

<button id="copyBtn" onclick="copyText()">Copy Breakdown</button>

</div>

<script>

// BASE PRICES
const breeds = {
"Ardennes":6300,
"Belgian":6300,
"Clydesdale":6300,
"Dutch Warmblood":6750,
"Oldenburger":7200,
"Holsteiner":7200,
"Arabian":8100,
"Thoroughbred":8100,
"Friesian":7200,
"Andalusian":7200,
"Mustang":6750,
"Appaloosa":6300,
"Emberian":9000
};

// PATTERNS
const patterns = {
"None":0,
"Zebra":0.15,
"Leopard":0.25,
"Blanket":0.25,
"Sabino":0.30,
"Tobiano":0.35,
"Overo":0.35,
"Solid":0.30
};

// COLORS
const colors = {
"Chestnut":0.10,
"Black":0.10,
"Bay":0.10,
"Palomino":0.13,
"Grey":0.10,
"Buckskin":0.13
};

window.onload = () => {

let sorted = Object.keys(breeds).sort();
for(let b of sorted){
breedList.innerHTML += `<option value="${b}">`;
}

for(let p in patterns){
pattern.innerHTML += `<option value="${p}">${p}</option>`;
}

for(let c in colors){
color.innerHTML += `<option value="${c}">${c}</option>`;
}
};

function toggleRP(){
rpSection.style.display = rp.value == "1" ? "block" : "none";
}

let lastBreakdown = "";

function calculate(){

let base = breeds[breed.value];

let total = base *
parseFloat(bred.value) *
parseFloat(sex.value) *
(1 + patterns[pattern.value]) *
(1 + colors[color.value]) *
parseFloat(breedtype.value);

let rpMult = 1;

if(rp.value == "1"){
rpMult =
parseFloat(age.value) *
parseFloat(lineage.value) *
parseFloat(exp.value) *
parseFloat(comp.value) *
parseFloat(health.value) *
parseFloat(papers.value);
}

total *= rpMult;

// XP
let xpVal = parseInt(xp.value) || 0;
let xpFactor = xpVal < 10000 ? 0.2 : 0.3;
let xpBonus = xpVal * xpFactor;

total += xpBonus;

// BREAKDOWN TEXT
lastBreakdown =
`BASE PRICE: $${base}

MULTIPLIERS: ${rpMult.toFixed(2)}

XP BONUS: $${xpBonus}

FINAL PRICE: $${Math.round(total)}`;

result.innerText = lastBreakdown;
copyBtn.style.display = "block";
}

function copyText(){
navigator.clipboard.writeText(lastBreakdown);
alert("Copied breakdown!");
}

</script>

</body>
</html>
