<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AE Horse Pricing</title>

<link rel="icon" href="https://cdn.discordapp.com/attachments/1451327685866422445/1521083410884333648/Untitled_Artwork.png?ex=6a438ad1&is=6a423951&hm=aa336971ae17e8f44c0bf0f546bed10fdce4bffe8c0eb94fee8d502ea4708244&">
  
<style>
body {
  font-family: Calibri, sans-serif;
  color: #fff;
  padding: 20px;

  background: url("https://cdn.discordapp.com/attachments/1451327685866422445/1520877586308399114/RedM_GTAProcess_UD3cIIyl7b.png?ex=6a42cb21&is=6a4179a1&hm=278399232d6cef68ba95c26dc72dadb5ed72556b83e576c8d7024841fb69d97f&")
    center / cover no-repeat fixed;
}

.container {
  max-width:750px;
  margin:auto;
  background: rgba(0, 0, 0, 0.8);
  padding:20px;
  border-radius:10px;
}

select, input {
  width:100%;
  padding:8px;
  margin:5px 0 15px 0;
  background:#2a2a2a;
  color:white;
  border:none;
}

button {
  width:100%;
  padding:12px;
  border:none;
  font-size:16px;
  cursor:pointer;
  border-radius:6px;
}

#calcBtn {
  background:#ff661a;
  color:#ffeee6;
  font-weight:bold;
}

#copyBtn {
  background:#444;
  color:white;
  margin-top:10px;
  display:none;
}

.section {
  margin-bottom:20px;
  padding-bottom:10px;
  border-bottom:1px solid #333;
}

#rpSection {
  display:none;
  background:#222;
  padding:10px;
  border-radius:8px;
}

.result {
  margin-top:20px;
  font-size:16px;
  white-space:pre-line;
  background:#0f0f0f;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>AE Horse Pricing System</h2>

<div class="section">

<label>Breeds</label>
<input list="breedList" id="breed" placeholder="Search breed...">
<datalist id="breedList"></datalist>

<label>Bred / Custom</label>
<select id="bred">
<option value="1">Bred</option>
<option value="0.9">Custom</option>
</select>

<label>Purebred / Mixed</label>
<select id="breedtype">
<option value="1.2">Purebred</option>
<option value="0.9">Mixed</option>
</select>

<label>Sex</label>
<select id="sex">
<option value="1.05">Mare</option>
<option value="1.05">Stallion</option>
<option value="0.9">Gelding</option>
<option value="0.8">Spayed</option>
</select>

<label>Pattern</label>
<select id="pattern">
</select>

<label>Color</label>
<select id="color">
</select>

<label>XP</label>
<input type="number" id="xp" min="0" max="10000" step="100" value="0">

<label>Max Stats</label>
<select id="maxStats">
  <option value="0">No</option>
  <option value="0.1">Yes</option>
</select>

<label>RP Enabled?</label>
<select id="rp" onchange="toggleRP()">
<option value="0">No</option>
<option value="1">Yes</option>
</select>

</div>

<div id="rpSection">

<label>Age</label>
<select id="age">
<option value="0.8">Unknown</option>
<option value="1.1">1-3</option>
<option value="1.05">3-6</option>
<option value="1.03">6-10</option>
<option value="1.02">10-15</option>
<option value="0.99">15-20</option>
<option value="0.95">20+</option>
</select>

<label>Full Lineage</label>
<select id="lineage">
<option value="1">No</option>
<option value="1.1">Yes</option>
</select>

<label>Experience</label>
<select id="exp">
<option value="0.8">Unknown</option>
<option value="0.83">Unhandled</option>
<option value="1.03">Started</option>
<option value="1.08">Green</option>
<option value="1.2">Intermediate</option>
<option value="1.25">Advanced</option>
<option value="1.3">Elite</option>
</select>

<label>Competition Placings</label>
<select id="comp">
<option value="1">No</option>
<option value="1.2">Yes</option>
</select>

<label>Health Status</label>
<select id="health">
<option value="0.85">Unknown</option>
<option value="1.1">Clean record</option>
<option value="0.9">Minor past injuries</option>
<option value="0.8">Moderate past injuries</option>
<option value="0.75">Severe past injuries</option>
<option value="0.7">Current injury</option>
<option value="0.5">Chronic condition</option>
</select>

<label>Papers Available</label>
<select id="papers">
<option value="1">No</option>
<option value="1.1">Yes</option>
</select>

</div>

<button id="calcBtn" onclick="calculate()">Calculate Horse Price</button>

<div class="result" id="result"></div>

<button id="copyBtn" onclick="copyText()">Copy Breakdown</button>

</div>

<script>

// DOM
const breed = document.getElementById("breed");
const bred = document.getElementById("bred");
const sex = document.getElementById("sex");
const patternSelect = document.getElementById("pattern");
const colorSelect = document.getElementById("color");
const breedtype = document.getElementById("breedtype");
const xp = document.getElementById("xp");
const maxStats = document.getElementById("maxStats");
const rp = document.getElementById("rp");
const rpSection = document.getElementById("rpSection");
const result = document.getElementById("result");
const copyBtn = document.getElementById("copyBtn");
  
const age = document.getElementById("age");
const lineage = document.getElementById("lineage");
const exp = document.getElementById("exp");
const comp = document.getElementById("comp");
const health = document.getElementById("health");
const papers = document.getElementById("papers");
  
// BASE PRICES
const breeds = {
"Akhal Teke": 8100,
"American Appendix Horse": 8500,
"American Cream Draft": 5400,
"American Saddlebred": 7650,
"American Standardbred": 6300,
"American Miniature Horse": 7000,
"American Paint Horse": 6300,
"Andalusian": 7200,
"Anglo-Arabian": 7200,
"Appaloosa": 6300,
"AraAppaloosa": 8100,
"Arabian": 8100,
"Ardennes": 6300,
"Barock Pinto": 7200,
"Belgian Draft": 6300,
"Black Forest": 6400,
"Breton": 6300,
"Camargue": 5400,
"Canadian Horse": 5400,
"Cleveland Bay": 5400,
"Clydesdale":6300 ,
"Colorado Ranger": 8100,
"Comtois": 6300,
"Connemara": 5400,
"Criollo": 6750,
"Donkey": 4500,
"Dutch Warmblood": 6750,
"Egyptian Arabian": 7200,
"Emberian": 9000,
"Exmoor": 5400,
"Fjord": 6750,
"Foundation American Quarter Horse": 7200,
"Friesian": 7200,
"German Riding Pony": 6300,
"Haflinger": 5400,
"Horses Of The Apocalypse": 9000,
"Holsteiner": 7200,
"Hungarian Halfbred": 6750,
"Icelandic": 6300,
"Irish Cob": 6300,
"Kentucky Saddler": 6300,
"Kladruber": 7200,
"Knabstrupper": 6300,
"Lewitzer": 5500,
"Lipizzaner": 7650,
"Lusitano Baroque": 7200,
"Lusitano Sport": 7200,
"Mammoth Jackstock": 5400,
"Mangy": 4500,
"Menorquin": 7650,
"Merens": 7650,
"Missouri Fox Trotter": 8100,
"Modern American Quarter Horse": 7200,
"Morgan": 6300,
"Mule": 4500,
"Murgese": 7200,
"Mustang": 6750,
"Nez Perce": 8100,
"Nokota": 6750,
"Norfolk Roadster": 7200,
"Noriker": 4950,
"Oldenburger": 7200,
"Paso Fino": 7200,
"Percheron Draft Mule": 5400,
"Pintabian": 8100,
"PRE Modern": 7200,
"PRE Traditional": 7200,
"Przewalski": 7200,
"Rocky Mountain Horse": 7200,
"Selle Francais": 7200,
"Shetland": 4050,
"Shire": 6300,
"Standard Lusitano": 7200,
"Suffolk Punch": 5400,
"Sugarbush Harlequin": 6300,
"Tennessee Walker": 6750,
"Thoroughbred": 8100,
"Tiger Horse": 8100,
"Trotteur Francais": 7200,
"Turkoman": 8100,
"Warlander": 5400,
"Welsh Cob": 5400,
"Welsh Pony": 5400,
"Zebra": 5400
};

// PATTERNS
const patterns = {
"Solid":0.30,
"Leopard":0.25,
"Blanket":0.25,
"Snowflake":0.25,
"Few Spotted":0.25,
"Tovero":0.35,
"Sabino":0.30,
"Tobiano":0.35,
"Overo":0.35,
"Zebra":0.15,
"Splashed White":0.3,
"Rabicano":0.3,
"Brindle":0.2,
"Dun":0.25,
"Roan":0.3
};

// COLORS
const colorMap = {
"Chestnut":0.10,
"Black":0.10,
"Bay":0.10,
"Flaxen Chestnut":0.12,
"Pangare Chestnut":0.12,
"Pangare Bay":0.12,
"Palomino":0.13,
"Buckskin":0.13,
"Smokey Black":0.13,
"Cremello":0.15,
"Perlino":0.15,
"Smokey Cream":0.15,
"Gold Champagne":0.15,
"Amber Champagne":0.15,
"Classic Champagne":0.15,
"Gold Cream Champagne":0.16,
"Classic Cream Champagne":0.16,
"Amber Cream Champagne":0.16,
"Grey":0.1,
"Rose Grey":0.12,
"Dominant White":0.18,
"Red Mushroom":0.15,
"Bay Mushroom":0.15,
"Silver Black":0.18,
"Silver Bay":0.18,
"Silver Smokey Black":0.1,
"Silver Buckskin":0.18
};

window.onload = () => {

 const breedList = document.getElementById("breedList");

  const patternSelect = document.getElementById("pattern");
  const colorSelect = document.getElementById("color");

  let sorted = Object.keys(breeds).sort();

  for (let b of sorted) {
    breedList.innerHTML += `<option value="${b}">`;
  }

  for (let p in patterns) {
    patternSelect.innerHTML += `<option value="${p}">${p}</option>`;
  }

  for (let c in colorMap) {
    colorSelect.innerHTML += `<option value="${c}">${c}</option>`;
  }
};

function toggleRP(){
  rpSection.style.display = rp.value == "1" ? "block" : "none";

  if (rp.value == "0") {

    age.value = "1";
    lineage.value = "1";
    exp.value = "1";
    comp.value = "1";
    health.value = "1";
    papers.value = "1";
  }
}

let lastBreakdown = "";

function calculate(){

let breedName = breed.value.trim();
let base = breeds[breedName];

console.log("Base:", base);
console.log("Breed:", breedName);
console.log("Pattern:", patternSelect.value);
console.log("Pattern Bonus:", patterns[patternSelect.value] ?? 0);
console.log("Color Bonus:", colorMap[colorSelect.value] ?? 0);

let appearanceAdd = 0;
let performanceAdd = 0;
let conditionAdd = 0;
let otherAdd = 0;

let total = base *
parseFloat(bred.value) *
parseFloat(sex.value) *
(1 + (patterns[pattern.value] ?? 0)) *
(1 + (colorMap[colorSelect.value] ?? 0)) *
parseFloat(breedtype.value);

let rpMult = 1;

if(rp.value == "1"){
rpMult =
parseFloat(age.value) *
parseFloat(lineage.value) *
parseFloat(exp.value) *
parseFloat(comp.value) *
parseFloat(health.value) *
parseFloat(papers.value);
}

total *= rpMult;

// APPEARANCE
appearanceAdd =
base * (colorMap[colorSelect.value] ?? 0) +
base * (patterns[pattern.value] ?? 0);

if (rp.value == "1") {

  // PERFORMANCE
  performanceAdd =
  base * (parseFloat(exp.value)-1) +
  base * (parseFloat(comp.value)-1);
  performanceAdd += base * (parseFloat(maxStats.value) || 0);

  // CONDITION
  conditionAdd =
  base * (parseFloat(age.value)-1) +
  base * (parseFloat(sex.value)-1) +
  base * (parseFloat(health.value)-1) +
  base * (parseFloat(breedtype.value)-1);

  // OTHER
  otherAdd =
  base * (parseFloat(bred.value)-1) +
  base * (parseFloat(lineage.value)-1) +
  base * (parseFloat(papers.value)-1);

} else {

  performanceAdd = 0;
  conditionAdd = 0;
  otherAdd = 0;

}

// XP
let xpVal = parseInt(xp.value) || 0;

if (xpVal > 10000) {
  xpVal = 10000;
}

if (xpVal < 0) {
  xpVal = 0;
}

xp.value = xpVal;

let xpFactor = xpVal === 10000 ? 0.35 : 0.25;
let xpBonus = xpVal * xpFactor;

total += xpBonus;

// Bonding Bonus
let bondingBonus = 0;

if (xpVal >= 8000) {
  bondingBonus = 0.09;
} else if (xpVal >= 6000) {
  bondingBonus = 0.06;
} else if (xpVal >= 4000) {
  bondingBonus = 0.03;
}

performanceAdd += base * bondingBonus;
total += base * bondingBonus;

lastBreakdown =
`BASE PRICE: $${Math.round(base)}

APPEARANCE: ${appearanceAdd >= 0 ? "+" : "-"}$${Math.round(Math.abs(appearanceAdd))}

PERFORMANCE: ${performanceAdd >= 0 ? "+" : "-"}$${Math.round(Math.abs(performanceAdd))}

CONDITION: ${conditionAdd >= 0 ? "+" : "-"}$${Math.round(Math.abs(conditionAdd))}

XP: +$${Math.round(xpBonus)}

OTHER: ${otherAdd >= 0 ? "+" : "-"}$${Math.round(Math.abs(otherAdd))}

────────────────────

FINAL PRICE: $${Math.round(total)}`;

result.innerText = lastBreakdown;
copyBtn.style.display = "block";
}

function copyText(){
navigator.clipboard.writeText(lastBreakdown);
alert("Copied breakdown!");
}
xp.addEventListener("input", () => {
  let val = parseInt(xp.value);

  if (isNaN(val)) val = 0;

  if (val > 10000) xp.value = 10000;
  if (val < 0) xp.value = 0;
});

rp.addEventListener("change", () => {
  toggleRP();

  if (lastBreakdown !== "") {
    calculate();
  }
});

</script>

</body>
</html>
